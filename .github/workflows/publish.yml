name: Publish to PyPI

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write  
      id-token: write  
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          
      - name: Read version from pyproject.toml
        id: version
        run: |
          VERSION=$(grep -E '^version = ' pyproject.toml | cut -d '"' -f 2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Package version: $VERSION"
          
      - name: Check if version already published
        id: check_published
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "tag_exists=true" >> $GITHUB_OUTPUT
          else
            echo "tag_exists=false" >> $GITHUB_OUTPUT
          fi
          
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/pybencher/$VERSION/json")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "pypi_exists=true" >> $GITHUB_OUTPUT
          else
            echo "pypi_exists=false" >> $GITHUB_OUTPUT
          fi
          
      - name: Create version tag
        if: steps.check_published.outputs.tag_exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.version.outputs.version }}" -m "Release version ${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"
          
      - name: Build and Publish to PyPI
        if: steps.check_published.outputs.pypi_exists == 'false'
        run: |
          uv sync --dev
          uv build
          uv publish
